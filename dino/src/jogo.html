<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Trunfo Dino</title>
<style>
/* PALETA BISEXUAL: Rosa #D60270, Roxo #9B4F96, Azul #0038A8 */
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, Helvetica, sans-serif}

body{background:#0b0b0b;color:#fff;overflow-x:hidden}

.container{max-width:1000px;margin:auto;padding:20px;text-align:center}

h1{color:#D60270;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,0.5)}

/* MODAL DE INÍCIO */
.modal{
position:fixed;inset:0;background:rgba(0,0,0,0.85);
display:flex;align-items:center;justify-content:center;z-index:1000
}

.modal-content{
background:#111;padding:30px;border-radius:12px;
border:2px solid #9B4F96;
width:400px;max-width:90%;
box-shadow: 0 0 20px rgba(155, 79, 150, 0.4);
}

.modal-content h2{margin-bottom:20px;color:#D60270}

.input-group{margin-bottom:15px;text-align:left}
.input-group label{display:block;margin-bottom:5px;font-size:14px;color:#aaa}
.input-group input, .input-group select{
width:100%;padding:10px;border-radius:6px;
background:#222;color:#fff;border:1px solid #333;
}

.btn-start{
width:100%;padding:12px;background:linear-gradient(90deg, #D60270, #9B4F96, #0038A8);
color:white;border:none;border-radius:6px;font-weight:bold;font-size:16px;
cursor:pointer;transition:0.3s;margin-top:10px;
}
.btn-start:hover{filter:brightness(1.2);transform:scale(1.02)}

/* ÁREA DE JOGO */
#gameArea{display:none;}

.game-info{
display:flex;justify-content:space-between;align-items:center;
background:#111;padding:15px 20px;border-radius:8px;border:1px solid #222;
margin-bottom:20px;
}

.turn-indicator{font-size:20px;font-weight:bold;color:#9B4F96;}
.deck-count{font-size:14px;color:#aaa;}

.arena{
display:flex;justify-content:space-between;gap:20px;
margin-top:30px;position:relative;
}

.player-area{flex:1;display:flex;flex-direction:column;align-items:center;}
.player-name{font-size:18px;margin-bottom:15px;color:#0038A8;font-weight:bold;}

/* CARTAS */
.card{
width:280px;height:450px;background:#1a1a1a;
border-radius:12px;border:2px solid #333;
position:relative;overflow:hidden;
transition:all 0.3s;
display:flex;flex-direction:column;
}

.card.active{border-color:#D60270;box-shadow:0 0 15px rgba(214,2,112,0.4);}

.card-face-down{
position:absolute;inset:0;
background:linear-gradient(135deg, #D60270 0%, #9B4F96 50%, #0038A8 100%);
display:flex;align-items:center;justify-content:center;
font-size:40px;color:rgba(255,255,255,0.3);font-weight:bold;
z-index:10;
}

.card-header{
padding:12px;background:#222;text-align:center;
border-bottom:2px solid #9B4F96;font-weight:bold;font-size:18px;
}

.card-header .dino-tipo {
font-size: 13px; color: #aaa; font-weight: normal; margin-top: 4px;
background: #333; display: inline-block; padding: 2px 8px; border-radius: 10px;
}

.card-img{
height:130px;background:#000;display:flex;align-items:center;justify-content:center;
font-size:12px;color:#666;overflow:hidden;
}
.card-img img{width:100%;height:100%;object-fit:cover;}

.stats{flex:1;padding:10px;display:flex;flex-direction:column;gap:5px;}

.stat-btn{
background:#222;color:#fff;border:1px solid #444;
padding:7px 12px;border-radius:6px;display:flex;justify-content:space-between;
cursor:pointer;transition:0.2s;font-size:14px;
}

.card.interactive .stat-btn:hover{
background:#9B4F96;border-color:#D60270;transform:scale(1.02);
}

.stat-name{font-weight:bold;color:#aaa;}
.card.interactive .stat-btn:hover .stat-name{color:#fff;}

/* FEEDBACK & MESA */
.center-board{
display:flex;flex-direction:column;align-items:center;justify-content:center;
width:200px;text-align:center;
}

.pool-info{
margin-bottom:15px;font-size:14px;color:#D60270;font-weight:bold;
background:#222;padding:5px 10px;border-radius:20px;
}

.action-msg{font-size:16px;margin-bottom:15px;min-height:40px;}

.btn-next{
background:#0038A8;color:white;border:none;padding:10px 20px;
border-radius:6px;font-weight:bold;cursor:pointer;display:none;
transition:0.2s;
}
.btn-next:hover{background:#D60270;}

/* BOTÕES DE FIM DE JOGO */
.end-game-actions {
display: none;
flex-direction: column;
gap: 10px;
width: 100%;
}
.end-game-actions button {
width: 100%;
display: block;
}
.btn-rematch { background: #9B4F96; }
.btn-home { background: #333; }
.btn-rematch:hover { filter: brightness(1.2); }
.btn-home:hover { filter: brightness(1.2); }

</style>
</head>
<body>

<div class="modal" id="setupModal">
    <div class="modal-content">
        <h2>Super Trunfo Dinos</h2>
        <div class="input-group">
            <label>Nome Jogador 1</label>
            <input type="text" id="p1Name" value="Player 1" required>
        </div>
        <div class="input-group">
            <label>Nome Jogador 2</label>
            <input type="text" id="p2Name" value="Player 2" required>
        </div>
        <div class="input-group">
            <label>Cartas por jogador</label>
            <input type="number" id="cardsPerPlayer" value="5" min="2" max="20" required>
        </div>
        <div class="input-group">
            <label>Modo de Jogo</label>
            <select id="gameMode">
                <option value="random">Dinos Aleatórios</option>
                <option value="top">Top Dinos Famosos</option>
            </select>
        </div>
        <button class="btn-start" onclick="iniciarJogo()">Começar Batalha</button>
        <p id="loadingMsg" style="color:#aaa; font-size:12px; margin-top:10px; display:none;">Buscando dinos na API...</p>
    </div>
</div>

<div class="container" id="gameArea">
    <h1>🦖 DINO TRUNFO</h1>
    
    <div class="game-info">
        <div class="deck-count" id="p1DeckCount">Cartas: 0</div>
        <div class="turn-indicator" id="turnIndicator">Vez de: ...</div>
        <div class="deck-count" id="p2DeckCount">Cartas: 0</div>
    </div>

    <div class="arena">
        <div class="player-area">
            <div class="player-name" id="p1Label">Player 1</div>
            <div class="card" id="cardP1">
                <div class="card-face-down" id="p1Cover">?</div>
                <div class="card-content" id="p1Content"></div>
            </div>
        </div>

        <div class="center-board">
            <div class="pool-info" id="poolInfo" style="display:none;">Cartas na mesa: <span id="poolCount">0</span></div>
            <div class="action-msg" id="actionMsg">O jogo vai começar!</div>
            
            <button class="btn-next" id="btnNext" onclick="proximaRodada()">Próxima Rodada</button>
            
            <div class="end-game-actions" id="endGameActions">
                <button class="btn-next btn-rematch" onclick="iniciarJogo()">Revancha</button>
                <button class="btn-next btn-home" onclick="voltarAoInicio()">Voltar ao Início</button>
            </div>
        </div>

        <div class="player-area">
            <div class="player-name" id="p2Label">Player 2</div>
            <div class="card" id="cardP2">
                <div class="card-face-down" id="p2Cover">?</div>
                <div class="card-content" id="p2Content"></div>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = "http://localhost:3000/dinos";

// ESTADO DO JOGO
let p1 = { nome: '', deck: [] };
let p2 = { nome: '', deck: [] };
let turn = 1; // 1 = P1, 2 = P2
let mesa = []; 
let roundOver = false;

const attributesMap = [
    { key: 'ALTURA', label: 'Altura' },
    { key: 'COMPRIMENTO', label: 'Comprimento' },
    { key: 'PESO', label: 'Peso' },
    { key: 'VELOCIDADE', label: 'Velocidade' },
    { key: 'AGILIDADE', label: 'Agilidade' },
    { key: 'LONGEVIDADE', label: 'Longevidade' },
    { key: 'NUMERO_MAGICO', label: 'Nº Mágico' },
    { key: 'FAMA', label: 'Fama' }
];

async function iniciarJogo() {
    // Restaura a interface caso seja uma revanche
    document.getElementById("cardP1").style.display = "flex";
    document.getElementById("cardP2").style.display = "flex";
    document.getElementById("endGameActions").style.display = "none";
    mesa = []; // Limpa a mesa pra nova partida

    const p1Input = document.getElementById("p1Name").value || "Player 1";
    const p2Input = document.getElementById("p2Name").value || "Player 2";
    const qtdCartas = parseInt(document.getElementById("cardsPerPlayer").value) || 5;
    const mode = document.getElementById("gameMode").value;

    p1.nome = p1Input;
    p2.nome = p2Input;
    const totalDinosToFetch = qtdCartas * 2;

    document.getElementById("loadingMsg").style.display = "block";
    document.getElementById("actionMsg").innerText = "Embaralhando dinos...";

    try {
        let endpoint = mode === 'top' ? `/top/fama/${totalDinosToFetch}` : `/random/${totalDinosToFetch}`;
        const response = await fetch(API_BASE + endpoint);
        
        if (!response.ok) throw new Error("Erro na API");
        let dinos = await response.json();

        dinos = dinos.sort(() => Math.random() - 0.5);

        const half = Math.floor(dinos.length / 2);
        if (half === 0) {
            alert("Não há dinossauros suficientes no banco de dados!");
            document.getElementById("loadingMsg").style.display = "none";
            return;
        }

        p1.deck = dinos.slice(0, half);
        p2.deck = dinos.slice(half, half * 2);

        document.getElementById("setupModal").style.display = "none";
        document.getElementById("gameArea").style.display = "block";
        document.getElementById("p1Label").innerText = p1.nome;
        document.getElementById("p2Label").innerText = p2.nome;

        prepararRodada();

    } catch (error) {
        alert("Erro ao buscar dinossauros. Verifique se seu backend está rodando em http://localhost:3000");
        document.getElementById("loadingMsg").style.display = "none";
    }
}

function prepararRodada() {
    roundOver = false;
    document.getElementById("btnNext").style.display = "none";
    
    document.getElementById("p1DeckCount").innerText = `Cartas: ${p1.deck.length}`;
    document.getElementById("p2DeckCount").innerText = `Cartas: ${p2.deck.length}`;
    
    if (p1.deck.length === 0 || p2.deck.length === 0) {
        finalizarJogo();
        return;
    }

    if(mesa.length > 0){
        document.getElementById("poolInfo").style.display = "block";
        document.getElementById("poolCount").innerText = mesa.length;
    } else {
        document.getElementById("poolInfo").style.display = "none";
    }

    const currentName = turn === 1 ? p1.nome : p2.nome;
    document.getElementById("turnIndicator").innerText = `Vez de: ${currentName}`;
    document.getElementById("actionMsg").innerText = "Escolha um atributo!";

    renderCard("p1", p1.deck[0], turn === 1);
    renderCard("p2", p2.deck[0], turn === 2);
}

function getVal(obj, key) {
    if (obj[key] !== undefined) return obj[key];
    if (obj[key.toLowerCase()] !== undefined) return obj[key.toLowerCase()];
    return null;
}

function renderCard(playerId, dino, isInteractive) {
    const cardEl = document.getElementById(`card${playerId.toUpperCase()}`);
    const coverEl = document.getElementById(`${playerId}Cover`);
    const contentEl = document.getElementById(`${playerId}Content`);

    if (isInteractive) {
        coverEl.style.display = "none";
        cardEl.classList.add("interactive", "active");
    } else {
        coverEl.style.display = "flex";
        cardEl.classList.remove("interactive", "active");
    }

    const nomeDino = getVal(dino, 'NOME') || 'Desconhecido';
    const tipoDino = getVal(dino, 'TIPO') || 'Sem Tipo';
    const imgDino = getVal(dino, 'IMAGEM');

    let imgHtml = imgDino ? `<img src="${imgDino}" alt="dino">` : 'Sem Imagem';
    
    let statsHtml = attributesMap.map(attr => {
        let val = getVal(dino, attr.key);
        val = val !== null ? val : 0; 

        return `
            <div class="stat-btn" onclick="if(!roundOver && ${isInteractive}) resolverTurno('${attr.key}', '${attr.label}')">
                <span class="stat-name">${attr.label}</span>
                <span class="stat-val">${val}</span>
            </div>
        `;
    }).join('');

    contentEl.innerHTML = `
        <div class="card-header">
            ${nomeDino}
            <div class="dino-tipo">${tipoDino}</div>
        </div>
        <div class="card-img">${imgHtml}</div>
        <div class="stats">${statsHtml}</div>
    `;
}

function resolverTurno(attrKey, attrLabel) {
    roundOver = true;
    
    document.getElementById("p1Cover").style.display = "none";
    document.getElementById("p2Cover").style.display = "none";
    document.getElementById("cardP1").classList.remove("interactive");
    document.getElementById("cardP2").classList.remove("interactive");

    const card1 = p1.deck[0];
    const card2 = p2.deck[0];

    const val1 = Number(getVal(card1, attrKey)) || 0;
    const val2 = Number(getVal(card2, attrKey)) || 0;

    let msg = `Atributo: ${attrLabel} (${val1} vs ${val2}). `;

    if (val1 > val2) {
        msg += `<br><span style="color:#D60270">${p1.nome} Venceu a rodada!</span>`;
        vencedorRodada(1);
    } else if (val2 > val1) {
        msg += `<br><span style="color:#0038A8">${p2.nome} Venceu a rodada!</span>`;
        vencedorRodada(2);
    } else {
        msg += `<br><span style="color:#9B4F96">Empate! Cartas vão pra mesa.</span>`;
        empateRodada();
    }

    document.getElementById("actionMsg").innerHTML = msg;
    document.getElementById("btnNext").style.display = "inline-block";
}

function vencedorRodada(winnerNum) {
    const card1 = p1.deck.shift();
    const card2 = p2.deck.shift();

    if (winnerNum === 1) {
        p1.deck.push(card1, card2, ...mesa);
        turn = 1; 
    } else {
        p2.deck.push(card2, card1, ...mesa);
        turn = 2; 
    }
    mesa = []; 
}

function empateRodada() {
    mesa.push(p1.deck.shift(), p2.deck.shift());
}

function proximaRodada() {
    prepararRodada();
}

function finalizarJogo() {
    const winner = p1.deck.length > 0 ? p1.nome : p2.nome;
    const color = p1.deck.length > 0 ? '#D60270' : '#0038A8';
    
    document.getElementById("actionMsg").innerHTML = `
        <h2 style="color:${color}; font-size:28px;">🏆 ${winner} venceu! 🏆</h2>
    `;
    
    document.getElementById("turnIndicator").innerText = "Fim de Jogo";
    
    // Esconde as cartas e botão "Próxima"
    document.getElementById("cardP1").style.display = "none";
    document.getElementById("cardP2").style.display = "none";
    document.getElementById("poolInfo").style.display = "none";
    document.getElementById("btnNext").style.display = "none";
    
    // Mostra os botões finais
    document.getElementById("endGameActions").style.display = "flex";
}

function voltarAoInicio() {
    // Esconde o jogo e limpa a tela de fim de jogo
    document.getElementById("gameArea").style.display = "none";
    document.getElementById("endGameActions").style.display = "none";
    
    // Mostra o Modal de Configuração
    document.getElementById("setupModal").style.display = "flex";
    document.getElementById("loadingMsg").style.display = "none";
    
    // Restaura as cartas escondidas pro próximo uso visual
    document.getElementById("cardP1").style.display = "flex";
    document.getElementById("cardP2").style.display = "flex";
    
    // Reinicia contadores vitais
    p1.deck = [];
    p2.deck = [];
    mesa = [];
    turn = 1;
}
</script>

</body>
</html>
