<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Wordle Clone</title>

<style>
  body {
    font-family: Arial;
  }

  .linha {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .linha input {
    width: 50px;
    height: 50px;
    text-align: center;
    font-size: 24px;
    text-transform: uppercase;
  }
</style>
</head>

<body>

<div>
  <label for="secreto">Digite a palavra secreta</label>
  <input type="password" id="secreto" minlength="5" maxlength="5">
</div>
<br>

<div id="tabuleiro"></div>

<script>
//const termo = require('./termo')
const tabuleiro = document.getElementById("tabuleiro");
const secreta = document.getElementById("secreto");

// cria uma linha com 5 inputs
function criarLinha() {
  const linha = document.createElement("div");
  linha.classList.add("linha");

  
  const palavra = []
  for (let i = 0; i < 5; i++) {
    
    const input = document.createElement("input");
    input.maxLength = 1;

    input.addEventListener("input", () => {
      if(input.value){
      console.log(input.value)
      palavra.push(input.value)
      }
      
      input.value = input.value.toUpperCase();

      if (input.value && input.nextElementSibling) {
        input.nextElementSibling.focus();
      }
    });
    
    input.addEventListener("keydown", (e) => {
      // voltar com backspace
      if (e.key === "Backspace" && input.previousElementSibling && !input.value) {
        palavra.pop();
        input.previousElementSibling.focus();        
      }

      // apertou ENTER → cria nova linha
      if (e.key === "Enter") {
        console.log(palavra)
        termo(secreta.value, palavra.join(''))
        criarLinha();
        const novaLinha = tabuleiro.lastChild;
        novaLinha.querySelector("input").focus();
      }
    });



    linha.appendChild(input);
  }

  tabuleiro.appendChild(linha);
}

// cria a primeira linha ao carregar
criarLinha();
</script>
<script src="termo.js"></script>

</body>
</html>
